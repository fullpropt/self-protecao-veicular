# ============================================
# Nixpacks Configuration - ZapVender Bruno
# Build completo: frontend Vite + backend Node.js
# ============================================

[phases.setup]
nixPkgs = ["nodejs_20", "npm", "python311", "gcc", "gnumake"]

[phases.install]
cmds = [
    "npm ci --legacy-peer-deps"
]

[phases.build]
cmds = [
    "npm run build:frontend",
    "mkdir -p sessions data uploads",
    "chmod 755 sessions data uploads",
    "npm prune --omit=dev"
]

[start]
cmd = "npm run db:migrate && node server/index.js"

[variables]
NODE_ENV = "production"
